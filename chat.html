<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Voyago AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0f1923;--s1:#16202c;--s2:#1e2d3d;--s3:#243447;--border:#2a3f55;--acc:#00d4aa;--blue:#0099ff;--red:#ff4757;--yel:#ffd32a;--txt:#e8f4f8;--mut:#6b8fa8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Cairo,sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{background:linear-gradient(135deg,#16202c,#1e2d3d);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 18px rgba(0,0,0,.5)}
.hrow{display:flex;align-items:center;gap:12px}
.hlogo{width:44px;height:44px;background:linear-gradient(135deg,#00d4aa,#0099ff);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;box-shadow:0 4px 14px rgba(0,212,170,.3)}
.htitle h1{font-size:17px;font-weight:900;background:linear-gradient(90deg,#00d4aa,#0099ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.htitle p{font-size:11px;color:var(--mut);margin-top:1px}
#sb{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;transition:all .3s}
#sb.on{background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.3);color:#00d4aa}
#sb.off{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:#ff4757}
.sdot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
.on .sdot{background:#00d4aa}.off .sdot{background:#ff4757}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* SUGGESTION BAR */
.sbar{background:var(--s1);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;align-items:center}
.sbar::-webkit-scrollbar{display:none}
.slbl{font-size:11px;color:var(--mut);white-space:nowrap;flex-shrink:0}
.qbtn{flex-shrink:0;background:var(--s2);border:1px solid var(--border);color:var(--txt);border-radius:18px;padding:5px 13px;font-size:11px;font-family:Cairo,sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.qbtn:hover{background:var(--acc);border-color:var(--acc);color:#0f1923;transform:translateY(-1px)}
.qbtn.r{border-color:rgba(255,71,87,.4);color:var(--red)}.qbtn.r:hover{background:var(--red);color:#fff;border-color:var(--red)}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* MESSAGE ROWS */
.mrow{display:flex;gap:9px;animation:up .3s ease}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.mrow.u{flex-direction:row-reverse}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;align-self:flex-end}
.av.bot{background:rgba(0,212,170,.1);border:1px solid var(--border)}
.av.usr{background:var(--blue);border:2px solid rgba(0,153,255,.4)}

.bbl{max-width:74%;padding:12px 16px;border-radius:16px;line-height:1.75;font-size:14px}
.bbl.bot{background:var(--s2);border:1px solid var(--border);border-bottom-right-radius:3px}
.bbl.usr{background:linear-gradient(135deg,#0099ff,#006ecc);border-bottom-left-radius:3px;color:#fff;text-align:right}
.bbl.emg{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.35);border-bottom-right-radius:3px}
.bbl.fall{background:rgba(255,211,42,.06);border:1px solid rgba(255,211,42,.25);border-bottom-right-radius:3px}
.bbl.hi{background:linear-gradient(135deg,rgba(0,212,170,.07),rgba(0,153,255,.07));border:1px solid rgba(0,212,170,.18);border-bottom-right-radius:3px}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 9px;border-radius:7px;margin-bottom:7px;font-weight:700}
.b-h{background:rgba(0,153,255,.15);color:#0099ff;border:1px solid rgba(0,153,255,.3)}
.b-a{background:rgba(163,113,247,.15);color:#a371f7;border:1px solid rgba(163,113,247,.3)}
.b-r{background:rgba(255,166,77,.15);color:#ffa64d;border:1px solid rgba(255,166,77,.3)}
.b-g{background:rgba(0,212,170,.15);color:#00d4aa;border:1px solid rgba(0,212,170,.3)}
.b-e{background:rgba(255,71,87,.15);color:#ff4757;border:1px solid rgba(255,71,87,.3)}
.b-f{background:rgba(255,211,42,.15);color:#ffd32a;border:1px solid rgba(255,211,42,.3)}

/* CARDS */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:9px;margin-top:11px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;transition:all .22s;text-align:right}
.card:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,212,170,.13)}
.cnum{font-size:10px;color:var(--mut);margin-bottom:3px}
.cname{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:5px;line-height:1.35}
.crat{font-size:12px;color:var(--yel);font-weight:700;margin-bottom:4px}
.cdesc{font-size:11px;color:var(--mut);line-height:1.5;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cbtn{display:inline-block;font-size:11px;color:var(--acc);font-weight:700;padding:4px 10px;border:1px solid rgba(0,212,170,.3);border-radius:8px;transition:all .2s;cursor:pointer}
.cbtn:hover{background:rgba(0,212,170,.1)}

/* EMERGENCY */
.enums{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.enum{background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.35);border-radius:10px;padding:7px 14px;font-size:14px;font-weight:900;color:var(--red)}
.hosp{margin-top:8px;font-size:12px;color:var(--mut);padding:6px 11px;background:var(--s1);border-radius:8px;border:1px solid var(--border)}

/* QUICK REPLIES */
.qrs{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.qr{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:5px 12px;font-size:12px;color:var(--mut);cursor:pointer;transition:all .2s;font-family:Cairo,sans-serif}
.qr:hover{border-color:var(--acc);color:var(--acc);background:rgba(0,212,170,.05)}

/* TYPING */
.tdots{display:flex;gap:5px;padding:12px 15px;align-items:center}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--acc);opacity:.4;animation:td 1.5s infinite}
.tdot:nth-child(2){animation-delay:.25s}.tdot:nth-child(3){animation-delay:.5s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-8px);opacity:1}}

/* TIMESTAMP */
.ts{font-size:10px;color:var(--mut);margin-top:4px}
.mrow.u .ts{text-align:left}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:30px;gap:14px;animation:up .5s ease}
.wico{width:76px;height:76px;background:linear-gradient(135deg,#00d4aa,#0099ff);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 12px 34px rgba(0,212,170,.28);margin-bottom:6px}
.welcome h2{font-size:23px;font-weight:900;background:linear-gradient(90deg,#00d4aa,#0099ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{font-size:13px;color:var(--mut);line-height:2;max-width:370px}
.wchips{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.wchip{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:7px 16px;font-size:13px;cursor:pointer;transition:all .22s;font-family:Cairo,sans-serif;color:var(--txt)}
.wchip:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-2px)}

/* INPUT BAR */
.ibar{background:var(--s1);border-top:1px solid var(--border);padding:12px 18px;display:flex;gap:9px;align-items:center;flex-shrink:0;box-shadow:0 -4px 18px rgba(0,0,0,.2)}
.lsel{background:var(--s2);border:1px solid var(--border);color:var(--mut);border-radius:10px;padding:9px 10px;font-size:12px;font-family:Cairo,sans-serif;cursor:pointer;outline:none}
.lsel:focus{border-color:var(--acc)}
.inp{flex:1;background:var(--s2);border:1px solid var(--border);color:var(--txt);border-radius:12px;padding:11px 16px;font-size:14px;font-family:Cairo,sans-serif;outline:none;direction:auto;transition:all .22s}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,212,170,.08)}
.inp::placeholder{color:var(--mut)}
.sbtn{width:46px;height:46px;background:linear-gradient(135deg,#00d4aa,#0099ff);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:900;transition:all .22s;flex-shrink:0;box-shadow:0 4px 14px rgba(0,212,170,.28)}
.sbtn:hover{transform:scale(1.07);box-shadow:0 6px 20px rgba(0,212,170,.4)}
.sbtn:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;padding:20px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:460px;width:100%;max-height:85vh;overflow-y:auto;position:relative;animation:slideUp .25s ease;direction:rtl}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:16px;left:16px;background:var(--s2);border:1px solid var(--border);color:var(--mut);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{color:var(--red);border-color:rgba(255,71,87,.4)}
.modal-ico{font-size:40px;margin-bottom:12px;text-align:center}
.modal-name{font-size:20px;font-weight:900;margin-bottom:8px;text-align:center}
.modal-rat{color:var(--yel);font-size:16px;font-weight:700;text-align:center;margin-bottom:14px}
.modal-desc{font-size:13px;color:var(--mut);line-height:1.9;margin-bottom:16px;background:var(--s2);padding:12px;border-radius:10px;border:1px solid var(--border)}
.modal-row{display:flex;align-items:center;gap:9px;padding:8px 12px;background:var(--s2);border-radius:9px;border:1px solid var(--border);margin-bottom:8px;font-size:13px}
.modal-row span{color:var(--mut);font-size:16px}
.modal-actions{display:flex;gap:9px;margin-top:16px}
.modal-btn{flex:1;padding:11px;border-radius:11px;font-size:14px;font-family:Cairo,sans-serif;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.modal-btn.primary{background:linear-gradient(135deg,#00d4aa,#0099ff);color:#fff}
.modal-btn.primary:hover{transform:scale(1.02);box-shadow:0 4px 14px rgba(0,212,170,.35)}
.modal-btn.sec{background:var(--s2);border:1px solid var(--border);color:var(--txt)}
.modal-btn.sec:hover{border-color:var(--acc);color:var(--acc)}
</style>
</head>
<body>

<header>
  <div class="hrow">
    <div class="hlogo">V</div>
    <div class="htitle">
      <h1>Voyago AI</h1>
      <p>مساعدك السياحي الذكي للفيوم 🗺️</p>
    </div>
  </div>
  <div id="sb" class="off"><div class="sdot"></div><span id="stxt">جاري الاتصال...</span></div>
</header>

<div class="sbar">
  <span class="slbl">جرب:</span>
  <button class="qbtn" onclick="qs('عايز أحجز فندق في الفيوم','ar')">🏨 حجز فندق</button>
  <button class="qbtn" onclick="qs('عايز فندق فاخر','ar')">👑 فندق فاخر</button>
  <button class="qbtn" onclick="qs('عايز فندق رخيص','ar')">💰 فندق رخيص</button>
  <button class="qbtn" onclick="qs('أنا جوعان عايز آكل سمك','ar')">🐟 مطعم سمك</button>
  <button class="qbtn" onclick="qs('عايز مطعم مشاوي','ar')">🔥 مشاوي</button>
  <button class="qbtn" onclick="qs('عايز أتجول وأشوف وادي الريان','ar')">🌊 وادي الريان</button>
  <button class="qbtn" onclick="qs('عايز أشوف أماكن تاريخية','ar')">🏛️ أماكن تاريخية</button>
  <button class="qbtn" onclick="qs('عايز مرشد سياحي محترف','ar')">🧭 مرشد</button>
  <button class="qbtn" onclick="qs('best hotel in fayoum','en')">🏨 Hotel EN</button>
  <button class="qbtn r" onclick="qs('محتاج نجدة الآن','ar')">🚨 طوارئ</button>
</div>

<div class="chat" id="chat">
  <div class="welcome" id="wlc">
    <div class="wico">🗺️</div>
    <h2>مرحباً! أنا Voyago AI</h2>
    <p>سألني عن أي حاجة في الفيوم<br/>فنادق · مطاعم · أماكن سياحية · مرشدين · طوارئ</p>
    <div class="wchips">
      <div class="wchip" onclick="qs('عايز أحجز فندق في الفيوم','ar')">🏨 عايز فندق</div>
      <div class="wchip" onclick="qs('أنا جوعان عايز آكل','ar')">🍔 عايز آكل</div>
      <div class="wchip" onclick="qs('عايز أتجول في الفيوم','ar')">🏛️ عايز أتجول</div>
      <div class="wchip" onclick="qs('عايز مرشد سياحي','ar')">🧭 عايز مرشد</div>
    </div>
  </div>
</div>

<div class="ibar">
  <select class="lsel" id="lang">
    <option value="auto">🌐</option>
    <option value="ar">🇪🇬</option>
    <option value="en">🇺🇸</option>
  </select>
  <input class="inp" id="inp" placeholder="اسألني عن أي حاجة في الفيوم..." onkeydown="if(event.key==='Enter')send()"/>
  <button class="sbtn" id="sendBtn" onclick="send()">↑</button>
</div>

<script>
const API='http://localhost:8000';
let sid='s_'+Date.now();

// health check
window.addEventListener('load',async()=>{
  try{const r=await fetch(API+'/health');const d=await r.json();
    setOk('متصل ✓ — '+d.model);
    setTimeout(greet,500);
  }catch{setBad('السيرفر غير متصل ✗');}
});

function setOk(t){const e=document.getElementById('sb');e.className='on';document.getElementById('stxt').textContent=t;}
function setBad(t){const e=document.getElementById('sb');e.className='off';document.getElementById('stxt').textContent=t;}

function greet(){
  addBot({
    message:'مرحباً! 👋 أنا **Voyago AI**، مساعدك الذكي للسياحة في الفيوم.\n\nأنا بفهم أسئلتك الطبيعية زي:\n🏨 *"عايز فندق قريب من البحيرة"*\n🍔 *"أنا جوعان عايز آكل سمك"*\n🏛️ *"عايز أتجول وأشوف أماكن جميلة"*\n🧭 *"محتاج مرشد سياحي محترف"*\n\nإيه اللي تحب تسأل عنه؟ 😊',
    type:'hi',intent:'greeting',language:'ar',data:{}
  });
}

function qs(m,l){
  const w=document.getElementById('wlc');if(w)w.remove();
  document.getElementById('inp').value=m;
  document.getElementById('lang').value=l;
  send();
}

async function send(){
  const inp=document.getElementById('inp');
  const lang=document.getElementById('lang').value;
  const msg=inp.value.trim();
  if(!msg)return;
  const w=document.getElementById('wlc');if(w)w.remove();
  inp.value='';
  document.getElementById('sendBtn').disabled=true;
  addUser(msg);
  const tid=showTyping();
  try{
    const res=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,session_id:sid,language:lang})});
    const d=await res.json();
    rmTyping(tid);addBot(d);
  }catch{
    rmTyping(tid);
    addBot({message:'❌ **تعذّر الاتصال بالسيرفر**\nتأكد إن السيرفر شغال:\n`.\\venv\\Scripts\\python -m app.main`',type:'fallback',intent:'unknown',language:'ar',data:{suggestions:['فنادق الفيوم','مطاعم','أماكن سياحية']}});
  }
  document.getElementById('sendBtn').disabled=false;
  inp.focus();
}

function addUser(msg){
  const c=document.getElementById('chat'),row=mk('mrow u');
  row.innerHTML=`<div class="av usr">👤</div><div><div class="bbl usr">${esc(msg)}</div><div class="ts">${now()}</div></div>`;
  c.appendChild(row);sc();
}

function addBot(d){
  const c=document.getElementById('chat'),row=mk('mrow');
  let bc='bot';
  if(d.type==='emergency')bc='emg';
  else if(d.type==='fallback')bc='fall';
  else if(d.type==='hi')bc='hi';
  const bdg=d.type!=='hi'?badge(d.intent,d.type):'';
  row.innerHTML=`<div class="av bot">🤖</div><div style="max-width:76%"><div class="bbl ${bc}">${bdg}<div>${fmt(d.message)}</div>${buildBody(d)}</div><div class="ts">${now()}</div></div>`;
  c.appendChild(row);
  row.querySelectorAll('.qr').forEach(q=>q.addEventListener('click',()=>{document.getElementById('inp').value=q.dataset.m||q.textContent.trim();send();}));
  sc();
}

function badge(intent,type){
  const m={fayoum_hotels:['b-h','🏨','فنادق'],fayoum_attractions:['b-a','🏛️','معالم'],fayoum_restaurants:['b-r','🍔','مطاعم'],fayoum_tourguides:['b-g','🧭','مرشدين'],fayoum_emergency:['b-e','🚨','طوارئ'],unknown:['b-f','❓','غير معروف']};
  const[cls,ic,lb]=m[intent]||['b-f','💬',intent];
  return`<div class="badge ${cls}">${ic} ${lb}</div>`;
}

function buildBody(d){
  if(!d.data)return'';

  // Cards
  if(d.data.items&&d.data.items.length){
    const icons={fayoum_hotels:'🏨',fayoum_restaurants:'🍔',fayoum_attractions:'🏛️',fayoum_tourguides:'🧭'};
    const ico=icons[d.intent]||'📍';
    const cards=d.data.items.map((x,i)=>{
      const dataAttr=`data-item='${JSON.stringify(x).replace(/'/g,"&#39;")}'`;
      return`<div class="card" onclick="showModal(this)" ${dataAttr}>
        <div class="cnum">${ico} #${i+1}</div>
        <div class="cname">${esc(x.name||'—')}</div>
        ${x.rating?`<div class="crat">⭐ ${x.rating}</div>`:''}
        ${x.description?`<div class="cdesc">${esc(x.description)}</div>`:''}
        <div class="cbtn">عرض التفاصيل ←</div>
      </div>`;
    }).join('');
    return`<div class="cards">${cards}</div>${afterCards(d.intent)}`;
  }

  // Emergency
  if(d.data.numbers){
    const n=d.data.numbers;
    return`<div class="enums">
      <div class="enum">🚔 شرطة: <strong>${n.police}</strong></div>
      <div class="enum">🚑 إسعاف: <strong>${n.ambulance}</strong></div>
      <div class="enum">🚒 مطافئ: <strong>${n.fire}</strong></div>
    </div>${d.data.nearest_hospital?`<div class="hosp">🏥 أقرب مستشفى: ${d.data.nearest_hospital}</div>`:''}
    <div class="qrs"><div class="qr" data-m="فنادق الفيوم">🏨 فنادق</div><div class="qr" data-m="مطاعم في الفيوم">🍔 مطاعم</div><div class="qr" data-m="أماكن سياحية">🏛️ أماكن</div></div>`;
  }

  // Fallback suggestions
  if(d.data.suggestions&&d.data.suggestions.length){
    return`<div class="qrs">${d.data.suggestions.map(s=>`<div class="qr" data-m="${s}">${s}</div>`).join('')}</div>`;
  }
  return'';
}

function afterCards(intent){
  const m={
    fayoum_hotels:`<div class="qrs"><div class="qr" data-m="عايز مطعم في الفيوم">🍔 مطاعم قريبة</div><div class="qr" data-m="عايز أتجول في الفيوم">🏛️ أماكن سياحية</div><div class="qr" data-m="عايز مرشد سياحي">🧭 مرشد</div></div>`,
    fayoum_restaurants:`<div class="qrs"><div class="qr" data-m="عايز فندق في الفيوم">🏨 فنادق</div><div class="qr" data-m="عايز أتجول">🏛️ أماكن</div><div class="qr" data-m="عايز مرشد">🧭 مرشد</div></div>`,
    fayoum_attractions:`<div class="qrs"><div class="qr" data-m="عايز فندق قريب">🏨 فنادق</div><div class="qr" data-m="مطاعم في الفيوم">🍔 مطاعم</div><div class="qr" data-m="عايز مرشد">🧭 مرشد</div></div>`,
    fayoum_tourguides:`<div class="qrs"><div class="qr" data-m="فنادق الفيوم">🏨 فنادق</div><div class="qr" data-m="مطاعم">🍔 مطاعم</div><div class="qr" data-m="أماكن سياحية">🏛️ أماكن</div></div>`,
  };
  return m[intent]||'';
}

// ── MODAL ──
function showModal(el){
  const item=JSON.parse(el.dataset.item);
  const icons={id:'#',name:'📌',rating:'⭐',description:'📝',location:'📍',phone:'📞',languages:'🗣️',price:'💰'};
  let rows='';
  if(item.rating) rows+=`<div class="modal-row"><span>⭐</span> تقييم: <strong>${item.rating} / 5</strong></div>`;
  if(item.price)  rows+=`<div class="modal-row"><span>💰</span> السعر: <strong>${item.price}</strong></div>`;
  if(item.location) rows+=`<div class="modal-row"><span>📍</span> الموقع: ${esc(item.location)}</div>`;
  if(item.phone)  rows+=`<div class="modal-row"><span>📞</span> التليفون: <strong>${esc(item.phone)}</strong></div>`;
  if(item.languages) rows+=`<div class="modal-row"><span>🗣️</span> اللغات: ${esc(item.languages)}</div>`;

  const html=`<div class="overlay" id="modal" onclick="if(event.target.id==='modal')closeModal()">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-ico">📍</div>
      <div class="modal-name">${esc(item.name||'—')}</div>
      ${item.rating?`<div class="modal-rat">⭐ ${item.rating} / 5</div>`:''}
      ${item.description?`<div class="modal-desc">${esc(item.description)}</div>`:''}
      ${rows}
      <div class="modal-actions">
        ${item.link?`<button class="modal-btn primary" onclick="window.open('${item.link}','_blank')">🔗 فتح الصفحة الكاملة</button>`:''}
        ${item.phone?`<button class="modal-btn sec" onclick="window.open('tel:${item.phone}')">📞 اتصال</button>`:''}
        <button class="modal-btn sec" onclick="closeModal()">إغلاق</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend',html);
}

function closeModal(){
  const m=document.getElementById('modal');
  if(m)m.remove();
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function showTyping(){
  const id='t'+Date.now(),c=document.getElementById('chat'),row=mk('mrow');
  row.id=id;
  row.innerHTML=`<div class="av bot">🤖</div><div class="bbl bot"><div class="tdots"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>`;
  c.appendChild(row);sc();return id;
}
function rmTyping(id){const e=document.getElementById(id);if(e)e.remove();}
function mk(cls){const e=document.createElement('div');e.className=cls;return e;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(s){return esc(s||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/`([^`]+)`/g,'<code style="background:rgba(0,0,0,.35);padding:1px 7px;border-radius:4px;font-size:11px;direction:ltr;display:inline-block">$1</code>').replace(/\n/g,'<br/>');}
function now(){return new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});}
function sc(){const c=document.getElementById('chat');c.scrollTop=c.scrollHeight;}
</script>
